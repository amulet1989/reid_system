# reid_system/docker-compose.yml
services:
  # 1. Base de Datos Vectorial
  vector_db:
    image: qdrant/qdrant:latest
    container_name: reid_qdrant
    networks:
      - retail_net
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # 2. Cola de Mensajes
  redis:
    image: redis:alpine
    container_name: reid_redis
    networks:
      - retail_net
    ports:
      - "6379:6379"
    restart: unless-stopped

  # 3. API Gateway (FastAPI)
  api:
    build: 
      context: ./api
    container_name: reid_api
    networks:
      - retail_net
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data:ro   
      - ./tmp_queries:/app/tmp_queries  # 👈 NUEVO: Buzón compartido 
    depends_on:
      - redis
      - vector_db
    restart: unless-stopped

  # 4. El Cerebro SOTA (Celery Worker con GPU)
  reid_backend:
    build:
      context: ./reid_backend
    container_name: reid_worker
    networks:
      - retail_net
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config.yml:/app/config.yml:ro
      - ./tmp_queries:/app/tmp_queries  # 👈 NUEVO: Buzón compartido
    depends_on:
      - redis
      - vector_db
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # 5. Interfaz de Usuario Visual
  web_ui:
    build:
      context: ./web_ui
    container_name: reid_web
    networks:
      - retail_net
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

  # 6. Procesador de Video (Slit-Scan Tracker Worker)
  video_processor:
    build:
      context: ./video_processor
    container_name: reid_video
    networks:
      - retail_net
    volumes:
      - ./models:/app/models          # 👈 Volumen para modelos dinámicos
      - ./tmp_queries:/app/tmp_queries
      - ./config.yml:/app/config.yml:ro
    environment:
      - API_URL=http://api:8000
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - YOLO_MODEL_URL=${YOLO_MODEL_URL}  # 🚀 NUEVO: URL del modelo YOLOv26m
      - FORCE_DOWNLOAD_MODEL=${FORCE_DOWNLOAD_MODEL}    # 👈 Cámbialo a true si quieres sobreescribir el modelo
    depends_on:
      - redis
      - api
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # 🚀 Comando: Arranca el worker escuchando EXCLUSIVAMENTE a video_queue
    command: celery -A worker.celery_app worker --loglevel=info -Q video_queue --pool=solo
    
networks:
  retail_net:
    driver: bridge